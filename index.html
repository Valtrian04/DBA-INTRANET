<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.B.A - Intranet de Acceso Restringido</title>
    
    <!-- LIBRERÍAS DE RECONOCIMIENTO FACIAL (Estilo 2000s Viola-Jones) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/data/face-min.js"></script>

    <style>
        /* RESET BÁSICO RETRO */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #008080; 
            font-family: "Courier New", Courier, monospace;
            color: #000000;
            line-height: 1.4;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            transition: background-color 0.2s;
        }

        /* FILTROS GLOBALES RÚSTICOS (Grano y Scanlines) */
        .noise-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; opacity: 0.15;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }
        .scanlines-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px; pointer-events: none; z-index: 51;
        }

        /* EFECTO GLITCH DE ERROR */
        .fatal-error {
            animation: textGlitch 0.2s infinite, shake 0.4s infinite;
            color: #ff0000 !important;
        }
        @keyframes textGlitch {
            0% { text-shadow: 2px 0 #00ff00, -2px 0 #0000ff; }
            50% { text-shadow: -2px 0 #00ff00, 2px 0 #0000ff; }
            100% { text-shadow: 2px 0 #00ff00, -2px 0 #0000ff; }
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        #main-wrapper {

        #logo-container::before { content: "DEPARTAMENTO DE BUSQUEDA"; font-size: 8px; position: absolute; top: 5px; text-align: center; color: #1a235a; font-weight: bold; font-family: Arial, sans-serif; width: 70px; }
        #logo-text { font-family: 'Times New Roman', Times, serif; font-size: 24px; font-weight: bold; color: #1a235a; text-shadow: 1px 1px #ccc; }
        #header-title { font-family: 'Times New Roman', Times, serif; font-size: 48px; letter-spacing: 10px; margin: 0; text-shadow: 2px 2px 0px #000; }

        #navbar { background-color: #d4d0c8; border-bottom: 2px solid #808080; display: flex; padding: 5px; }
        .nav-btn { background-color: #d4d0c8; border: 2px outset #ffffff; padding: 8px 5px; margin-right: 5px; font-family: "Courier New", Courier, monospace; font-size: 14px; color: #000080; text-decoration: none; cursor: pointer; text-align: center; flex: 1; display: flex; justify-content: center; align-items: center; }
        .nav-btn:active { border: 2px inset #ffffff; background-color: #c0c0c0; }
        .nav-btn.active { background-color: #e5e1d3; border: 2px inset #ffffff; color: #000000; font-weight: bold; border-bottom: none; }

        #alert-bar { background-color: #c0c0c0; border-bottom: 2px inset #ffffff; padding: 10px; text-align: center; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #333; }
        .content-area { min-height: 500px; }

        /* TAB INICIO Y VIDEO */
        #tab-inicio { display: flex; }
        #main-col { width: 65%; padding: 25px; border-right: 3px ridge #ffffff; }

        .video-player-container {
            background-color: #000000; border: 4px inset #808080; height: 320px; margin-bottom: 25px;
            position: relative; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .article-text p { margin-bottom: 20px; text-align: justify; font-size: 14px; font-weight: bold;}
        .quote { font-style: italic; text-align: center; font-weight: bold; margin-top: 30px; }

        #sidebar { width: 35%; padding: 20px; background-color: #e5e1d3; display: flex; flex-direction: column; }
        .sidebar-title { font-size: 16px; border-bottom: 2px dashed #000066; padding-bottom: 5px; margin-bottom: 20px; letter-spacing: 2px; font-weight: bold;}
        .news-item { margin-bottom: 20px; }
        .wireframe-img-box { border: 2px inset #808080; background-color: #d4d0c8; padding: 5px; font-family: Arial, sans-serif; font-size: 14px; display: flex; align-items: center; margin-bottom: 10px; }
        .news-date { color: #0000aa; font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .news-text { font-size: 12px; text-align: justify; font-weight: bold; }
        .msn-btn { background-color: #d4d0c8; border: 3px outset #ffffff; padding: 10px; font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; margin-top: auto; }
        .msn-btn:active { border: 3px inset #ffffff; }
        .msn-status { color: #00aa00; font-size: 16px; }

        /* RESTO DE TABS */
        #tab-nosotros { display: none; padding: 50px 60px; }
        .nosotros-title { font-family: "Courier New", Courier, monospace; font-size: 32px; margin-bottom: 40px; color: #000; font-weight: bold; }
        .nosotros-text { font-size: 14px; line-height: 1.8; margin-bottom: 30px; text-align: justify; font-weight: bold; }

        #tab-documentos { display: none; padding: 40px; }
        .doc-title { color: #000080; font-size: 24px; margin-bottom: 20px; font-weight: bold; }
        .doc-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
        .doc-table th { background-color: #c0c0c0; border: 1px solid #808080; padding: 8px; text-align: left; border-bottom: 2px solid #808080; }
        .doc-table td { border: 1px solid #808080; padding: 8px; background-color: #e5e1d3; }
        .doc-link { color: #0000ee; text-decoration: underline; cursor: pointer; }

        .redacted-container { display: flex; align-items: center; margin-bottom: 40px; }
        .redacted-number { border: 1px solid #ccc; padding: 2px 6px; font-size: 10px; color: red; margin-right: 15px; }
        .redacted-box { background-color: #000; height: 35px; width: 100%; }

        #tab-prueba { display: none; padding: 25px; }

        .form-options label { display: block; margin-bottom: 8px; cursor: pointer; }
        .submit-btn { background-color: #000066; color: #ffffff; font-family: "Courier New", Courier, monospace; font-size: 16px; font-weight: bold; padding: 10px 20px; border: 3px outset #ffffff; cursor: pointer; width: 100%; }
        .submit-btn:active { border: 3px inset #ffffff; background-color: #000044; }

        /* TAB RADIO INTERCEPTORA */
        #tab-radio { display: none; padding: 40px; text-align: center; }
        #radio-container {
            width: 80%; margin: 0 auto; background-color: #1a1a1a; border: 5px ridge #444;
            padding: 30px; position: relative; box-shadow: inset 0 0 30px #000, 0 0 15px rgba(0,0,0,0.8);
            border-radius: 10px;
        }
        .radio-title { color: #fff; font-family: "Courier New", Courier, monospace; letter-spacing: 4px; margin-bottom: 20px; border-bottom: 2px solid #555; padding-bottom: 10px; }
        
        .radio-display {
            background-color: #051005; border: 4px inset #003300; height: 90px;
            margin-bottom: 30px; display: flex; justify-content: center; align-items: center;
            color: #004400; font-size: 48px; font-family: 'Courier New', Courier, monospace;
            text-shadow: none; position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px #000;
        }
        
        .radio-dial-container { width: 150px; height: 150px; margin: 30px auto; border-radius: 50%; background: #222; border: 5px inset #555; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .radio-knob { width: 110px; height: 110px; border-radius: 50%; background: #d4d0c8; border: 4px outset #fff; cursor: grab; position: relative; transform: rotate(-135deg); box-shadow: 5px 5px 15px rgba(0,0,0,0.6); transition: filter 0.2s; }
        .radio-knob:active { cursor: grabbing; }
        .radio-knob.disabled { pointer-events: none; filter: brightness(0.6); cursor: not-allowed; }
        .knob-marker { width: 6px; height: 25px; background: #000; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); border-radius: 3px; border: 1px inset #555; }
        
        .radio-power-btn {
            background-color: #330000; color: #ff0000; border: 4px outset #ff0000;
            padding: 15px 30px; font-family: "Courier New", Courier, monospace; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .radio-power-btn:active { border: 4px inset #ff0000; background-color: #220000; }
        .radio-power-btn.active { background-color: #003300; color: #00ff00; border: 4px inset #00ff00; }

        /* NUEVO: TAB LABORATORIO DE ANÁLISIS FOTOGRÁFICO */
        #tab-laboratorio { display: none; padding: 25px; }
        .lab-container { display: flex; gap: 20px; background: #111; border: 5px ridge #444; padding: 20px; box-shadow: inset 0 0 20px #000; }
        .lab-viewer-wrapper { flex: 2; position: relative; }
        .lab-viewer { width: 100%; height: 350px; background: #000; border: 4px inset #222; overflow: hidden; position: relative; filter: brightness(100%) contrast(100%); transition: filter 0.1s ease-out; }
        .lab-controls { flex: 1; background: #d4d0c8; border: 3px outset #fff; padding: 15px; display: flex; flex-direction: column; }
        
        .lab-thumb { background: #000; color: #00ff00; border: 2px solid #00ff00; padding: 5px; margin-bottom: 10px; cursor: pointer; font-family: "Courier New", monospace; text-align: center; font-weight: bold; font-size: 12px; }
        .lab-thumb:hover { background: #003300; }
        .lab-thumb.active { background: #00ff00; color: #000; }
        
        .lab-slider-label { font-size: 12px; font-weight: bold; font-family: "Courier New", monospace; margin-top: 10px; display: block; }
        .lab-slider { -webkit-appearance: none; width: 100%; height: 8px; background: #000; border: 1px inset #555; margin: 5px 0 15px 0; outline: none; }
        .lab-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 30px; background: #d4d0c8; border: 2px outset #fff; cursor: pointer; }
        
        .hidden-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.1s ease-out; display: flex; align-items: center; justify-content: center; pointer-events: none; }

        .anomaly-tall { width: 30px; height: 250px; background: radial-gradient(ellipse at center, #fff 0%, transparent 60%); filter: blur(4px); position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .anomaly-eyes { width: 5px; height: 5px; background: #fff; box-shadow: 12px 0 0 #fff; position: absolute; top: 30px; left: 8px; filter: blur(1px); }
